prompt = "# Paper Reader 自动化 Prompt 模板（中文）\n\n项目定位：\n- `paper-daily` 只是候选检索脚本工具，不是日报生成器。\n- Codex 必须作为科研助理阅读候选、语义评分、排序、总结，并写入最终日报。\n\n运行方式：\n- 使用 Codex standalone automation。\n- 如果自动化配置可以指定 `cwd`，请设为你的本地 `paper-daily` 目录。\n- 不要切换到其他同名或旧路径项目。\n\n本地路径：\n/Users/jackie/Documents/Git/Codex_Automated_Paper_Reader/paper-daily\n\n路径要求：\n- 所有相对路径都必须以 `paper-daily` 目录为基准。\n- 使用你的 Python 可执行文件，/Users/jackie/Documents/Git/.venv/bin/python\n\n第一步：只运行候选检索，不要让脚本生成日报：\npython scripts/daily_papers.py --config config.yaml --date today --stage fetch --force\n\n网络预检要求：\n- 脚本会先检测 `export.arxiv.org`、`arxiv.org`、`openreview.net`、`api2.openreview.net` 等核心网址。\n- 如果网络预检失败，立即停止自动化并报告网络错误。\n- 不要继续评分，不要写空日报，不要用旧候选池冒充当天结果。\n\n候选文件：\n- fetch 完成后读取命令输出中的候选文件路径，通常是：\n  data/processed/YYYY-MM-DD_candidates.json\n- 同时读取 `data/raw/YYYY-MM-DD.json` 中的 `recommended_action` 和 `duplicate_check`。\n- 如果 `recommended_action` 是 `write_no_new_batch_note`、`duplicate_check.recommended_action` 是 `write_no_new_batch_note`、`duplicate_check.status` 是 `duplicate_of_previous`，或当天 candidates 为空 / paper id 集合与最近一天 candidates 完全一致：\n  - 不要重复生成正常 Top 10 日报。\n  - 不要沿用旧 Top 10 冒充当天新推荐。\n  - 写一个很短的“今日无新候选批次”说明到 `reports/YYYY-MM-DD.md`，注明候选数量、最近可见 arXiv 批次、主要原因（例如 arXiv 今日 recent-list 尚未更新、当天无公告批次、或候选池与上一批重复）。\n  - 除非用户明确要求补跑/重评，不要重写 `data/processed/YYYY-MM-DD_scored.json`。\n\n如果 fetch 失败或候选池为空：\n- 检查 `logs/YYYY-MM-DD.log`、`data/raw/YYYY-MM-DD.json` 和 `data/processed/YYYY-MM-DD_candidates.json`。\n- 如果原因是网络、代理、arXiv 或 OpenReview 访问失败，不要写泛化空日报。\n- 报告失败命令、错误原因、已生成文件、候选数量和建议修复方案。\n- 只有在用户明确要求 fallback 时，才可使用最近一个非空 candidates 文件生成补跑日报，并在报告开头标明来源日期。\n\n研究背景：\nagent system\n\n推荐原则：\n- 优先推荐能迁移到研究问题中的通用 AI 方法论文。\n- 不要只因为论文包含领域关键词就给高分。\n- 相邻领域论文只要方法可迁移，也可以高分。\n- 对直接领域论文也要看方法贡献、实验质量和可复用价值。\n\n重点关注：\nedge computing 和 agent system\n\n负向过滤：\n无\n\n评分维度，每项 0-5：\n- Methodological Relevance\n- Inspiration Value\n- Transferability to My Research\n- Paper Quality\n- Novelty / Timeliness\n- Actionability\n\n综合分：\nFinal Score =\n0.25 * Methodological Relevance\n+ 0.25 * Inspiration Value\n+ 0.20 * Transferability to My Research\n+ 0.15 * Paper Quality\n+ 0.10 * Novelty / Timeliness\n+ 0.05 * Actionability\n\n评分输出：\n保存到：\ndata/processed/YYYY-MM-DD_scored.json\n\n建议结构：\n{\n  \"date\": \"YYYY-MM-DD\",\n  \"status\": \"ok\",\n  \"generated_at\": \"...\",\n  \"candidate_path\": \"...\",\n  \"candidate_count\": 0,\n  \"deep_read_ids\": [],\n  \"top10_ids\": [],\n  \"papers\": [\n    {\n      \"...原始候选字段\": \"...\",\n      \"semantic_scores\": {\n        \"methodological_relevance\": 0,\n        \"inspiration_value\": 0,\n        \"transferability_to_my_research\": 0,\n        \"paper_quality\": 0,\n        \"novelty_timeliness\": 0,\n        \"actionability\": 0,\n        \"final_score\": 0\n      },\n      \"selected_for_deep_read\": false,\n      \"selected_for_top10\": false,\n      \"reading_evidence\": \"abstract-only / paper page / pdf\",\n      \"semantic_rank\": 0\n    }\n  ]\n}\n\n阅读流程：\n1. 读取 candidates.json，先基于 title、abstract、venue/categories、retrieval_reason 做逐篇语义评分。\n2. 从高分候选中选择约 15 篇进一步阅读。\n3. 对最终 Top 10 尽量打开论文页面或 PDF，阅读 abstract、introduction、method、experiments、conclusion。\n4. 如果只能基于 abstract 判断，必须在 `reading_evidence` 和日报中明确写明。\n5. 不要编造候选、网页或 PDF 中无法支持的信息。\n\n日报输出：\n- 需要关注和汇报的问题\r\n1. Introduction (引言)\r\n原有问题：\r\n\r\nWhat is the problem? 你要研究的具体科学问题是什么？\r\n\r\nWhy does it matter? 这个问题在现实世界或学术领域中为什么重要？\r\n\r\nWhat is the current status? 目前该领域的大致现状。\r\n\r\nWhat is your core contribution?（简述）你做了什么，解决了什么。\r\n\r\n详细补充需关注的问题：\r\n\r\n这个问题是否有明确的边界条件（例如特定场景、数据分布、硬件约束）？\r\n\r\n如果问题长期未被解决，根本难点是什么（例如非凸性、缺乏标注数据、实时性要求）？\r\n\r\n听众为何要在此时关注这个问题？是否有最近的技术突破、产业需求或政策驱动？\r\n\r\n你的核心贡献与已有最先进方法相比，最大的不同点是什么（用一句话概括）？\r\n\r\n你的贡献是解决了原有方法的一类缺陷，还是开辟了一个新的子方向？\r\n\r\n2. Background, Motivation & Related Work (背景、动机与相关工作)\r\n原有问题：\r\n\r\nWhat knowledge is needed? 听众理解你的工作需要具备哪些基础背景？\r\n\r\nWhat are the limitations of existing works? 现有的方案存在哪些瓶颈？\r\n\r\nWhy do we need a new approach? (Motivation) 为什么现有的方法不能直接解决你的问题？\r\n\r\n详细补充需关注的问题：\r\n\r\n听众是否可能混淆某些关键概念？需要提前区分的术语有哪些？\r\n\r\n现有工作的局限性是否被同行广泛承认，还是你首次指出？\r\n\r\n你的关键观察（Key Observation / Insight）是否可以通过一个小例子或预实验来直观展示？\r\n\r\n是否存在看似相关但实际上并不直接可比的工作？如果有，你如何划清界限？\r\n\r\n前人尝试过类似思路但失败的原因是什么？你的方法如何绕过这些失败点？\r\n\r\n3. System Overview (系统概述/方案概览)\r\n原有问题：\r\n\r\nWhat is the high-level workflow? 系统的输入是什么，输出是什么？整个处理流向是怎样的？\r\n\r\nWhat are the main modules? 系统由哪几个核心模块组成？\r\n\r\nHow do components interact? 模块之间是如何协作的？\r\n\r\n详细补充需关注的问题：\r\n\r\n是否有离线预处理或在线推理的划分？如果有，各在什么阶段完成？\r\n\r\n模块之间的接口定义是什么（例如数据结构、调用频率、同步/异步）？\r\n\r\n如果某个模块失败，系统是否有降级或容错机制？如果没有，是否需要说明？\r\n\r\n概览图中是否清晰标出了数据流与控制流的区别？\r\n\r\n听众能否在30秒内复述你的系统处理流程？如果不能，说明概览需要简化。\r\n\r\n4. System Design (系统设计/核心算法)\r\n原有问题：\r\n\r\nHow did you solve the problem? 具体的算法流程、数学公式或系统架构改进是什么？\r\n\r\nWhat are the design principles? 为什么要这样设计？\r\n\r\nWhat is the technical innovation? 哪一部分是你原创的？\r\n\r\n详细补充需关注的问题：\r\n\r\n你的设计是否依赖于某些假设（例如数据独立同分布、网络无限带宽）？这些假设在现实中是否近似成立？\r\n\r\n如果使用数学公式，每个符号是否有清晰的定义，并且与概览图中的模块对应？\r\n\r\n对于关键参数，是否给出了直觉解释（例如正则项系数控制精度与鲁棒性的平衡）？\r\n\r\n是否有边界情况或异常输入需要特殊处理？你是如何处理的？\r\n\r\n听众如果想复现你的方法，至少需要知道哪些实现细节（如随机种子、初始化方式）？\r\n\r\n5. Experiment Setup (实验设置)\r\n原有问题：\r\n\r\nWhat is the environment? 硬件配置、软件框架、网络环境等。\r\n\r\nWhat datasets/benchmarks are used? 使用了哪些标准数据集或自建数据集？\r\n\r\nWhat are the baselines? 你和哪些经典或最前沿的方法进行了对比？\r\n\r\nWhat are the metrics? 评价指标是什么？\r\n\r\n详细补充需关注的问题：\r\n\r\n每个数据集的大小、标注质量、类别分布、时间跨度等是否有显著特点？\r\n\r\n基线方法是否按照其原论文的最佳配置运行？如果无法复现，如何处理？\r\n\r\n是否使用了多种随机种子或交叉验证来减少偶然性？\r\n\r\n对于非确定性算法（如深度学习、随机采样），是否报告了均值和标准差？\r\n\r\n实验设置中是否有任何可能偏向你方法的细节（如超参数专门为你方法调优）？如果有，是否公正说明？\r\n\r\n6. Evaluation (实验评估/结果分析)\r\n原有问题：\r\n\r\nDoes it work? 你的方法是否优于对比方法？\r\n\r\nWhere does the improvement come from? (Ablation Study) 每个模块贡献了多少？\r\n\r\nHow does it perform under different conditions? (Sensitivity Analysis) 改变参数时表现是否稳定？\r\n\r\nAre there any interesting trade-offs? 是否牺牲了某方面性能换取了另一方面提升？\r\n\r\n详细补充需关注的问题：\r\n\r\n在主要结果中，你的方法在哪些子任务或数据子集上不占优势？原因是什么？\r\n\r\n消融实验中，是否出现了“去掉某模块反而性能提升”的反常现象？如何解释？\r\n\r\n敏感性分析中，参数在什么范围内性能开始剧烈下降？这个边界是否在实际应用中容易碰到？\r\n\r\n是否有统计显著性检验（如t检验、ANOVA）来证明差异不是由噪声引起？\r\n\r\n如果展示了运行时间或内存占用，这些开销是否在实际部署中可接受？\r\n\r\n7. Discussion (讨论与总结)\r\n原有问题：\r\n\r\nWhat are the key takeaways? 听众最应该记住的结论是什么？\r\n\r\nWhat are the limitations? 你的方法在哪些场景下可能失效？\r\n\r\nWhat are the broader implications? 你的研究对相关领域有什么启发？\r\n\r\nWhat is the future work? 下一步打算怎么做？\r\n\r\n详细补充需关注的问题：\r\n\r\n你的主要结论是否依赖于特定的实验条件？在更宽松或更严格的条件下结论是否仍然成立？\r\n\r\n是否有任何意外的负面结果值得分享？它们如何修正了你的初始直觉？\r\n\r\n你的方法是否可能被滥用或产生伦理风险？是否需要提出使用建议？\r\n\r\n未来工作是否可以分为“近期可做的小改进”和“需要突破的长期方向”两类？\r\n\r\n听众如果对你的方向感兴趣，最值得深入阅读的参考文献是哪一两篇？\r\n\r\n\r\n\r\n- 回答模板\r\n现有方法（如 AutoIOT）假设 ______，但实际中 ______ 导致 ______。\r\nGPIoT 发现根本原因不是 ______，而是 ______。\r\n因此它没有继续 ，而是做了一个非常规的设计：。\r\n代价是 ______，但换来了 ______。\r\n\r\n下次讨论前做\r\n准备一个 2 分钟的 elevator pitch：不讲细节，只讲“问题 → 洞察 → 设计选择 → 代价”\r\n\r\n- 关注点\r\n\r\n### 1. Introduction (引言)\r\n\r\n- What is the problem? 你要研究的具体科学问题是什么？\r\n- Why does it matter? 这个问题在现实世界或学术领域中为什么重要？\r\n- What is the current status? 目前该领域的大致现状。\r\n- What is your core contribution?（简述）你做了什么，解决了什么。\r\n\r\n- 这个问题是否有明确的边界条件（例如特定场景、数据分布、硬件约束）？\r\n- 如果问题长期未被解决，根本难点是什么（例如非凸性、缺乏标注数据、实时性要求）？\r\n- 听众为何要在此时关注这个问题？是否有最近的技术突破、产业需求或政策驱动？\r\n- 你的核心贡献与已有最先进方法相比，最大的不同点是什么（用一句话概括）？\r\n- 你的贡献是解决了原有方法的一类缺陷，还是开辟了一个新的子方向？\r\n\r\n---\r\n\r\n### 2. Background, Motivation & Related Work (背景、动机与相关工作)\r\n\r\n- What knowledge is needed? 听众理解你的工作需要具备哪些基础背景？\r\n- What are the limitations of existing works? 现有的方案存在哪些瓶颈？\r\n- Why do we need a new approach? (Motivation) 为什么现有的方法不能直接解决你的问题？\r\n\r\n- 听众是否可能混淆某些关键概念？需要提前区分的术语有哪些？\r\n- 现有工作的局限性是否被同行广泛承认，还是你首次指出？\r\n- 你的关键观察（Key Observation / Insight）是否可以通过一个小例子或预实验来直观展示？\r\n- 是否存在看似相关但实际上并不直接可比的工作？如果有，你如何划清界限？\r\n- 前人尝试过类似思路但失败的原因是什么？你的方法如何绕过这些失败点？\r\n\r\n---\r\n\r\n### 3. System Overview (系统概述/方案概览)\r\n\r\n- What is the high-level workflow? 系统的输入是什么，输出是什么？整个处理流向是怎样的？\r\n- What are the main modules? 系统由哪几个核心模块组成？\r\n- How do components interact? 模块之间是如何协作的？\r\n\r\n- 是否有离线预处理或在线推理的划分？如果有，各在什么阶段完成？\r\n- 模块之间的接口定义是什么（例如数据结构、调用频率、同步/异步）？\r\n- 如果某个模块失败，系统是否有降级或容错机制？如果没有，是否需要说明？\r\n- 概览图中是否清晰标出了数据流与控制流的区别？\r\n- 听众能否在30秒内复述你的系统处理流程？如果不能，说明概览需要简化。\r\n\r\n---\r\n\r\n### 4. System Design (系统设计/核心算法)\r\n\r\n- How did you solve the problem? 具体的算法流程、数学公式或系统架构改进是什么？\r\n- What are the design principles? 为什么要这样设计？\r\n- What is the technical innovation? 哪一部分是你原创的？\r\n\r\n- 你的设计是否依赖于某些假设（例如数据独立同分布、网络无限带宽）？这些假设在现实中是否近似成立？\r\n- 如果使用数学公式，每个符号是否有清晰的定义，并且与概览图中的模块对应？\r\n- 对于关键参数，是否给出了直觉解释（例如正则项系数控制精度与鲁棒性的平衡）？\r\n- 是否有边界情况或异常输入需要特殊处理？你是如何处理的？\r\n- 听众如果想复现你的方法，至少需要知道哪些实现细节（如随机种子、初始化方式）？\r\n\r\n---\r\n\r\n### 5. Experiment Setup (实验设置)\r\n\r\n- What is the environment? 硬件配置、软件框架、网络环境等。\r\n- What datasets/benchmarks are used? 使用了哪些标准数据集或自建数据集？\r\n- What are the baselines? 你和哪些经典或最前沿的方法进行了对比？\r\n- What are the metrics? 评价指标是什么？\r\n\r\n- 每个数据集的大小、标注质量、类别分布、时间跨度等是否有显著特点？\r\n- 基线方法是否按照其原论文的最佳配置运行？如果无法复现，如何处理？\r\n- 是否使用了多种随机种子或交叉验证来减少偶然性？\r\n- 对于非确定性算法（如深度学习、随机采样），是否报告了均值和标准差？\r\n- 实验设置中是否有任何可能偏向你方法的细节（如超参数专门为你方法调优）？如果有，是否公正说明？\r\n\r\n---\r\n\r\n### 6. Evaluation (实验评估/结果分析)\r\n\r\n- Does it work? 你的方法是否优于对比方法？\r\n- Where does the improvement come from? (Ablation Study) 每个模块贡献了多少？\r\n- How does it perform under different conditions? (Sensitivity Analysis) 改变参数时表现是否稳定？\r\n- Are there any interesting trade-offs? 是否牺牲了某方面性能换取了另一方面提升？\r\n\r\n- 在主要结果中，你的方法在哪些子任务或数据子集上不占优势？原因是什么？\r\n- 消融实验中，是否出现了“去掉某模块反而性能提升”的反常现象？如何解释？\r\n- 敏感性分析中，参数在什么范围内性能开始剧烈下降？这个边界是否在实际应用中容易碰到？\r\n- 是否有统计显著性检验（如t检验、ANOVA）来证明差异不是由噪声引起？\r\n- 如果展示了运行时间或内存占用，这些开销是否在实际部署中可接受？\r\n\r\n---\r\n\r\n### 7. Discussion (讨论与总结)\r\n\r\n- What are the key takeaways? 听众最应该记住的结论是什么？\r\n- What are the limitations? 你的方法在哪些场景下可能失效？\r\n- What are the broader implications? 你的研究对相关领域有什么启发？\r\n- What is the future work? 下一步打算怎么做？\r\n\r\n- 你的主要结论是否依赖于特定的实验条件？在更宽松或更严格的条件下结论是否仍然成立？\r\n- 是否有任何意外的负面结果值得分享？它们如何修正了你的初始直觉？\r\n- 你的方法是否可能被滥用或产生伦理风险？是否需要提出使用建议？\r\n- 未来工作是否可以分为“近期可做的小改进”和“需要突破的长期方向”两类？\r\n- 听众如果对你的方向感兴趣，最值得深入阅读的参考文献是哪一两篇？\r\n\r\n详细回答以上问题并且写入：\nreports/YYYY-MM-DD.md\n\n日报建议包含：\n- 今日概览\n- Top 10 Papers\n- 每篇论文的核心方法、迁移价值、可转化实验/模块、局限、阅读建议、证据来源\n- 今日重点趋势\n- 潜在研究 idea\n- 值得加入 related work 的论文\n\n最后回复用户：\n- 今日候选数量\n- Top 10 标题\n- scored.json 路径\n- 日报路径\n- 任何失败源、网络/代理问题或 abstract-only 限制\n\n禁止：\n- 禁止只调用脚本就结束。\n- 禁止直接使用关键词模板生成最终报告。\n- 禁止没阅读候选内容就总结。\n- 禁止生成大量重复套话。\n- 禁止因为论文命中领域关键词就给高分。\n- 禁止编造 PDF 或正文中没有的信息。\n- 禁止自动 git push。"
